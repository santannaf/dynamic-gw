apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-route-operator
  namespace: platform
  labels:
    app.kubernetes.io/name: gateway-route-operator
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-route-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-route-operator
        app.kubernetes.io/part-of: dynamic-gateway-control-plane
    spec:
      serviceAccountName: gateway-route-operator
      containers:
        - name: operator
          image: dynamic-gateway-operator:local
          imagePullPolicy: IfNotPresent
          env:
            - name: SPRING_MAIN_WEB_APPLICATION_TYPE
              value: none
            - name: OPERATOR_NAMESPACE
              value: platform
            - name: OPERATOR_GATEWAY_RELOAD_URL
              value: http://dynamic-gateway.platform.svc.cluster.local:8080/internal/routes/reload
            - name: OPERATOR_ROUTES_STORE_TYPE
              value: configmap
            - name: OPERATOR_ROUTES_STORE_CONFIGMAP_NAMESPACE
              value: platform
            - name: OPERATOR_ROUTES_STORE_CONFIGMAP_CONFIG_MAP_NAME
              value: gateway-routes
            - name: OPERATOR_ROUTES_STORE_CONFIGMAP_KEY
              value: routes.yaml
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
