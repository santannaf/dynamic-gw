apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dynamic-gateway
  namespace: platform
  labels:
    app.kubernetes.io/name: dynamic-gateway
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
# O Ingress NÃO aponta direto pro svc/dynamic-gateway. Em vez disso, ele cai
# no nginx-lb (k8s/nginx-lb/), que faz round-robin entre os pods do gateway
# via headless service. Isso garante que:
#   - Pods do gateway nunca são expostos diretamente.
#   - Quem se conecta de fora (k3d Traefik, port-forward, k6) sempre passa pelo
#     mesmo ponto de entrada que produção teria.
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-lb
                port:
                  number: 80
