apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-gateway
  namespace: platform
  labels:
    app.kubernetes.io/name: dynamic-gateway
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamic-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamic-gateway
        app.kubernetes.io/part-of: dynamic-gateway-control-plane
    spec:
      serviceAccountName: dynamic-gateway
      containers:
        - name: gateway
          image: dynamic-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GATEWAY_ROUTES_STORE_TYPE
              value: configmap
            - name: GATEWAY_ROUTES_STORE_CONFIGMAP_NAMESPACE
              value: platform
            - name: GATEWAY_ROUTES_STORE_CONFIGMAP_CONFIG_MAP_NAME
              value: gateway-routes
            - name: GATEWAY_ROUTES_STORE_CONFIGMAP_KEY
              value: routes.yaml
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 2000m
              memory: 768Mi
