apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-gateway
  namespace: platform
  labels:
    app.kubernetes.io/name: dynamic-gateway
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
    app.kubernetes.io/component: standalone
spec:
  # Duas réplicas: mesmo no modo standalone vale balancear carga + tolerar
  # rolling restart sem janela de unavailability (maxUnavailable: 0).
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamic-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamic-gateway
        app.kubernetes.io/part-of: dynamic-gateway-control-plane
        app.kubernetes.io/component: standalone
    spec:
      # SEM serviceAccountName customizado: modo standalone não precisa de
      # RBAC para ler ConfigMap remoto (não tem operator). O ServiceAccount
      # default do namespace basta.
      containers:
        - name: gateway
          image: dynamic-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: America/Sao_Paulo
            # Ativa o profile com as rotas estáticas embarcadas em
            # gateway/src/main/resources/application-standalone.yaml.
            # Mudou rota = rebuild da imagem (make load-images) + rollout
            # restart deste deployment.
            - name: SPRING_PROFILES_ACTIVE
              value: standalone
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # Modo standalone com catálogos pequenos (até alguns milhares
              # de rotas) cabe folgado em 512 MiB. Se for crescer para 30k+,
              # reabrir a issue de compactação (openspec/changes/reduce-gateway-route-memory).
              cpu: 8000m
              memory: 512Mi
