# Substitui k8s/operator/deployment.yaml quando o backend é S3.
# A diferença em relação ao modo ConfigMap é:
#   - OPERATOR_ROUTES_STORE_TYPE = s3
#   - envFrom carrega AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY do Secret
#   - OPERATOR_ROUTES_STORE_S3_* configura bucket/key/region
# As permissões RBAC sobre ConfigMap continuam — o operator ainda lê
# GatewayRoute CRDs e o write em ConfigMap fica simplesmente inerte enquanto
# o tipo for S3.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-route-operator
  namespace: platform
  labels:
    app.kubernetes.io/name: gateway-route-operator
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-route-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway-route-operator
        app.kubernetes.io/part-of: dynamic-gateway-control-plane
    spec:
      serviceAccountName: gateway-route-operator
      containers:
        - name: operator
          image: dynamic-gateway-operator:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: aws-credentials
          env:
            - name: SPRING_MAIN_WEB_APPLICATION_TYPE
              value: none
            - name: OPERATOR_NAMESPACE
              value: platform
            - name: OPERATOR_GATEWAY_RELOAD_URL
              value: http://dynamic-gateway.platform.svc.cluster.local:8080/internal/routes/reload
            - name: OPERATOR_ROUTES_STORE_TYPE
              value: s3
            - name: OPERATOR_ROUTES_STORE_S3_BUCKET
              value: REPLACE_WITH_BUCKET
            - name: OPERATOR_ROUTES_STORE_S3_KEY
              value: snapshots/routes.yaml
            - name: OPERATOR_ROUTES_STORE_S3_REGION
              value: us-east-1
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
