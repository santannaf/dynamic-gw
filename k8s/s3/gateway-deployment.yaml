# Substitui k8s/gateway/deployment.yaml quando o backend é S3.
# A diferença em relação ao modo ConfigMap é:
#   - GATEWAY_ROUTES_STORE_TYPE = s3
#   - envFrom carrega AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY do Secret
#   - GATEWAY_ROUTES_STORE_S3_* configura bucket/key/region
# A RBAC continua a do modo ConfigMap; em produção pode-se removê-la inteira
# se nenhum outro consumidor depender da ConfigMap (o gateway em modo S3 não
# consulta ConfigMap nenhuma).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-gateway
  namespace: platform
  labels:
    app.kubernetes.io/name: dynamic-gateway
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: dynamic-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dynamic-gateway
        app.kubernetes.io/part-of: dynamic-gateway-control-plane
    spec:
      serviceAccountName: dynamic-gateway
      containers:
        - name: gateway
          image: dynamic-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: aws-credentials
          env:
            - name: GATEWAY_ROUTES_STORE_TYPE
              value: s3
            - name: GATEWAY_ROUTES_STORE_S3_BUCKET
              value: REPLACE_WITH_BUCKET
            - name: GATEWAY_ROUTES_STORE_S3_KEY
              value: snapshots/routes.yaml
            - name: GATEWAY_ROUTES_STORE_S3_REGION
              value: us-east-1
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 2000m
              memory: 768Mi
