apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lb
  namespace: platform
  labels:
    app.kubernetes.io/name: nginx-lb
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
    app.kubernetes.io/component: edge-lb
spec:
  # 1 réplica basta: o nginx é só o ponto de entrada do k6 (port-forward
  # cai aqui). A redundância que importa pro teste é a do gateway (>=2).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-lb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-lb
        app.kubernetes.io/part-of: dynamic-gateway-control-plane
        app.kubernetes.io/component: edge-lb
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /lb/health
              port: 80
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /lb/health
              port: 80
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 2000m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: nginx-lb
