apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-lb
  namespace: platform
  labels:
    app.kubernetes.io/name: nginx-lb
    app.kubernetes.io/part-of: dynamic-gateway-control-plane
    app.kubernetes.io/component: edge-lb
data:
  nginx.conf: |
    worker_processes auto;
    events {
        worker_connections 4096;
    }

    http {
        access_log off;              # 20k req/min poluiria o stdout
        error_log  /dev/stderr warn;

        # Resolver do kube-dns (CoreDNS no k3d/kind/EKS). valid=5s força o
        # nginx a refazer a query a cada 5s, então pods novos (após scale)
        # entram no rodízio rápido e pods removidos saem.
        resolver kube-dns.kube-system.svc.cluster.local valid=5s ipv6=off;

        # IMPORTANTE: o upstream NAO é declarado num bloco `upstream {}`
        # estático porque o nginx resolveria o DNS uma vez na inicializacao
        # e ficaria preso ao snapshot inicial dos pods. Em vez disso, usamos
        # uma variável em `proxy_pass`, o que força resolução por request
        # (cacheada pelos `valid=5s` do resolver). O headless Service
        # `dynamic-gateway-headless` retorna um A record por pod, então
        # o round-robin natural do resolver distribui requests entre todos
        # os pods vivos do gateway.
        server {
            listen 80;
            server_name _;

            location / {
                set $upstream "dynamic-gateway-headless.platform.svc.cluster.local:8080";
                proxy_pass http://$upstream;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;

                # Devolve o IP:porta do pod do gateway que atendeu cada request.
                # Permite validar a distribuição entre réplicas sem mexer em log:
                #   curl -sI http://localhost:18000/httpbin/get | grep -i x-upstream
                # `always` garante que o header seja enviado mesmo em respostas
                # de erro (4xx/5xx) do upstream — útil pra distinguir "qual pod
                # falhou".
                add_header X-Upstream $upstream_addr always;

                proxy_connect_timeout 2s;
                proxy_send_timeout    10s;
                proxy_read_timeout    10s;

                proxy_next_upstream         error timeout;
                proxy_next_upstream_tries   2;
                proxy_next_upstream_timeout 5s;
            }

            location = /lb/health {
                access_log off;
                return 200 "ok\n";
            }
        }
    }
