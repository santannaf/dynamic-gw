spring:
  application:
    name: dynamic-gateway
  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

gateway:
  routes:
    store:
      type: configmap
      configmap:
        namespace: platform
        config-map-name: gateway-routes
        key: routes.yaml
      s3:
        bucket: ""
        key: ""
        region: ""
