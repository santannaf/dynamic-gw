plugins {
    id 'java'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
    id 'org.graalvm.buildtools.native'
}

ext {
    set('springBootVersion', '4.1.0')
    set('springCloudVersion', '2025.1.2')
    set('fabric8Version', '7.7.0')
}

dependencies {
    implementation project(':shared')

    implementation 'org.springframework.cloud:spring-cloud-starter-gateway-server-webflux'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation "io.fabric8:kubernetes-client:${fabric8Version}"

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-webflux'
    testImplementation "io.fabric8:kubernetes-server-mock:${fabric8Version}"
    testImplementation 'io.projectreactor:reactor-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        mavenBom "io.fabric8:kubernetes-client-bom:${fabric8Version}"
    }
}

graalvmNative {
    binaries {
        main {
            imageName = 'dynamic-gateway'
            mainClass = 'com.example.gateway.GatewayApplication'
            buildArgs.addAll(
                '--no-fallback',
                '--enable-url-protocols=http,https',
                '-H:+AddAllCharsets',                  // snakeyaml-engine (via Fabric8) precisa de UTF-32BE etc.
                '-H:+ReportExceptionStackTraces'
            )
        }
    }
    metadataRepository { enabled = true }
}
